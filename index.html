<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COFFRE À JOUETS</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      background-color: #000;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 0 60px;
      font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
    }

    .phone {
      width: 390px;
      min-height: 844px;
      background-color: #ffffff;
      padding: 56px 16px 80px 16px;
      position: relative;
    }

    .content {
      width: 100%;
    }

    .date-note {
      font-size: 13px;
      line-height: 18px;
      color: #8e8e93;
      text-align: center;
      margin-bottom: 24px;
    }

    .fragments {
      font-size: 17px;
      line-height: 22px;
      color: #1c1c1e;
    }

  </style>
</head>
<body>
  <div class="phone">
    <div class="content">

      <div class="date-note"><span id="date-modif">29 mai 2026 à 15h43</span></div>

      <div class="fragments">
        <!-- les fragments iront ici -->
      </div>

    </div>
  </div>
</body>
</html>
